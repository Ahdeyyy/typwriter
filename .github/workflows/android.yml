name: "android-build"

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "apps/typwriter-web/**"

jobs:
  build-android:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    env:
      NDK_VERSION: "29.0.14206865"
      JAVA_VERSION: "17"

    steps:
      - uses: actions/checkout@v4

      - name: Install system build tools (for vendored OpenSSL)
        run: |
          sudo apt-get update
          sudo apt-get install -y perl make build-essential

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Create per-target NDK tool shims for openssl-src
        # openssl-src hardcodes per-target tool names like
        # `aarch64-linux-android-ranlib` that NDK r23+ no longer ships
        # (everything is unified under `llvm-ar` / `llvm-ranlib`).
        # Shim every NDK install on the runner and export the bin dir of
        # the SDK-installed NDK (the one gradle actually uses) on PATH so
        # /bin/sh can resolve the tool names openssl-src invokes by name.
        run: |
          set -eux
          shim() {
            local bin_dir="$1"
            [ -d "$bin_dir" ] || return 0
            for triple in aarch64-linux-android armv7a-linux-androideabi \
                          arm-linux-androideabi i686-linux-android \
                          x86_64-linux-android; do
              for tool in ar ranlib nm strip ld as objcopy objdump readelf; do
                src="$bin_dir/llvm-$tool"
                dst="$bin_dir/${triple}-${tool}"
                [ -e "$src" ] && [ ! -e "$dst" ] && ln -s "llvm-$tool" "$dst" || true
              done
            done
          }
          sdk_ndk_bin=""
          for ndk in "$ANDROID_HOME"/ndk/*; do
            bin="$ndk/toolchains/llvm/prebuilt/linux-x86_64/bin"
            shim "$bin"
            sdk_ndk_bin="$bin"
          done
          shim "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          # Expose the SDK-installed NDK bin dir on PATH for later steps so
          # /bin/sh inside openssl's Makefile can find the shimmed tools.
          if [ -n "$sdk_ndk_bin" ]; then
            echo "$sdk_ndk_bin" >> "$GITHUB_PATH"
          fi
          echo "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/typwriter-desktop/src-tauri -> target"
          key: android

      - name: Install frontend dependencies
        run: bun install

      - name: Initialize Tauri Android project
        working-directory: apps/typwriter-desktop
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            bunx tauri android init
          fi

      - name: Setup Android signing
        working-directory: apps/typwriter-desktop
        run: |
          set -eux
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

          python3 - <<'PY'
          from pathlib import Path
          p = Path("app/build.gradle.kts")
          s = p.read_text()

          for imp in ('import java.io.FileInputStream', 'import java.util.Properties'):
              if imp not in s:
                  s = imp + '\n' + s

          block = '''    signingConfigs {
                  create("release") {
                      val keystorePropertiesFile = rootProject.file("keystore.properties")
                      val keystoreProperties = Properties()
                      if (keystorePropertiesFile.exists()) {
                          keystoreProperties.load(FileInputStream(keystorePropertiesFile))
                      }
                      keyAlias = keystoreProperties.getProperty("keyAlias")
                      keyPassword = keystoreProperties.getProperty("password")
                      storeFile = file(keystoreProperties.getProperty("storeFile"))
                      storePassword = keystoreProperties.getProperty("password")
                  }
              }

              buildTypes {'''
          if 'signingConfigs {' not in s:
              s = s.replace('    buildTypes {', block, 1)

          s = s.replace(
              'signingConfig = signingConfigs.getByName("debug")',
              'signingConfig = signingConfigs.getByName("release")',
          )
          p.write_text(s)
          PY
          cat app/build.gradle.kts

      - name: Build Android APK
        working-directory: apps/typwriter-desktop
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          NODE_OPTIONS: --max-old-space-size=4096
          # Vendored openssl-src shells out to per-target tools that don't
          # exist in NDK r26d (which unifies them under llvm-*); point each
          # target at the NDK clang/ar/ranlib so cross-compilation succeeds.
          CC_aarch64-linux-android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          CC_armv7-linux-androideabi: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi24-clang
          CC_i686-linux-android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android24-clang
          CC_x86_64-linux-android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android24-clang
          AR_aarch64-linux-android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          AR_armv7-linux-androideabi: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          AR_i686-linux-android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          AR_x86_64-linux-android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          RANLIB_aarch64-linux-android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib
          RANLIB_armv7-linux-androideabi: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib
          RANLIB_i686-linux-android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib
          RANLIB_x86_64-linux-android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib
        run: bunx tauri android build --apk --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: typwriter-android-apk
          path: |
            apps/typwriter-desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30
